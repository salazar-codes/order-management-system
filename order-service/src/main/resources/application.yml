server:
  port: 8081

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://localhost:5432/order_db
    username: order_user
    password: order_pass
  jpa:
    hibernate:
      ddl-auto: update   # Cómodo para desarrollo. En Testcontainers/CI (Paso 8) usaremos Flyway/validate.
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  # Kafka: order-service es productor en 3 topics (pide reservar, pide
  # cobrar, pide liberar-compensar) y consumidor en 2 (respuesta de
  # inventario, respuesta de pago). group-id identifica a este servicio ante
  # Kafka para el reparto de particiones entre instancias — si algún día
  # corres 2 réplicas de order-service, comparten este group-id y Kafka
  # reparte los mensajes entre ellas (ninguna procesa el mismo mensaje dos
  # veces).
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

logging:
  level:
    com.portfolio.orderservice: DEBUG

# URL para la ÚNICA llamada HTTP síncrona que queda en el sistema: el
# pre-chequeo de disponibilidad del Paso 6.
services:
  inventory:
    base-url: http://localhost:8082

resilience4j:
  circuitbreaker:
    instances:
      inventoryAvailability:
        sliding-window-size: 10          # cuántas llamadas recientes mira para calcular la tasa de fallos
        minimum-number-of-calls: 5        # no evalúa nada hasta tener al menos estas llamadas
        failure-rate-threshold: 50        # % de fallos que abre el circuito
        wait-duration-in-open-state: 10s  # cuánto tiempo se queda abierto antes de probar de nuevo
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      inventoryAvailability:
        max-attempts: 3
        wait-duration: 200ms

# Actuator expone /actuator/health con el estado del circuit breaker
# (CLOSED/OPEN/HALF_OPEN) — útil para ver el patrón en acción sin adivinar.
management:
  endpoints:
    web:
      exposure:
        include: health,circuitbreakers,circuitbreakerevents
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true