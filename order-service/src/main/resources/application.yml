server:
  port: 8081

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://localhost:5432/order_db
    username: order_user
    password: order_pass
  jpa:
    hibernate:
      ddl-auto: update   # Cómodo para desarrollo. En Testcontainers/CI (Paso 8) usaremos Flyway/validate.
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.portfolio.orderservice: DEBUG
