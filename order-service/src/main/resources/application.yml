server:
  port: 8081

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://localhost:5432/order_db
    username: order_user
    password: order_pass
  jpa:
    hibernate:
      ddl-auto: update   # Cómodo para desarrollo. En Testcontainers/CI (Paso 8) usaremos Flyway/validate.
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  # Kafka: order-service es productor en 3 topics (pide reservar, pide
  # cobrar, pide liberar-compensar) y consumidor en 2 (respuesta de
  # inventario, respuesta de pago). group-id identifica a este servicio ante
  # Kafka para el reparto de particiones entre instancias — si algún día
  # corres 2 réplicas de order-service, comparten este group-id y Kafka
  # reparte los mensajes entre ellas (ninguna procesa el mismo mensaje dos
  # veces).
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

logging:
  level:
    com.portfolio.orderservice: DEBUG