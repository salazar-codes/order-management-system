server:
  port: 8081

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://localhost:5432/order_db
    username: order_user
    password: order_pass
  jpa:
    hibernate:
      ddl-auto: update   # Cómodo para desarrollo. En Testcontainers/CI (Paso 8) usaremos Flyway/validate.
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.portfolio.orderservice: DEBUG

# URLs de los servicios que order-service llama de forma síncrona durante el
# SAGA. En el Paso 3 estas llamadas HTTP se reemplazan por eventos de Kafka
# (comunicación asíncrona) — por ahora es lo más simple para aprender el
# patrón de orquestación sin dos cosas nuevas a la vez.
services:
  inventory:
    base-url: http://localhost:8082
  payment:
    base-url: http://localhost:8083